name: "Bootstrap — Validate & Apply"

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/apply.yml'
      - 'scripts/**'
      - 'tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/apply.yml'
  # Apply is manual only — bootstrap is sensitive and should never auto-apply
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
      tf_state_bucket:
        description: "S3 bucket for Terraform remote state"
        required: false
        default: ""
        type: string
      tf_state_key:
        description: "S3 object key for Terraform state"
        required: false
        default: "bootstrap/terraform.tfstate"
        type: string
      tf_lock_table:
        description: "DynamoDB table for Terraform state locking"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pull-requests: read

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "ap-southeast-2"
  BOOTSTRAP_TF_STATE_BUCKET: ${{ vars.BOOTSTRAP_TF_STATE_BUCKET || '' }}
  BOOTSTRAP_TF_STATE_KEY: ${{ vars.BOOTSTRAP_TF_STATE_KEY || 'bootstrap/terraform.tfstate' }}
  BOOTSTRAP_TF_LOCK_TABLE: ${{ vars.BOOTSTRAP_TF_LOCK_TABLE || '' }}

jobs:
  validate:
    name: "Validate & Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check

      - name: OIDC Preflight (repo/org drift guard)
        run: |
          python3 scripts/oidc_preflight.py check \
            --variables-file terraform/variables.tf \
            --require-repo waterapps-10-bootstrap-oidc-iam \
            --require-repo waterapps-15-iam-access \
            --require-repo waterapps-20-infra-enterprise \
            --require-repo waterapps-contact-form

      - name: Unit Tests (OIDC preflight)
        run: python3 -m unittest discover -s tests -v

      - name: Security Scan — tfsec
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6
        with:
          working_directory: terraform
          soft_fail: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

  plan-pr:
    name: "Terraform Plan (PR)"
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: OIDC Preflight (repo/org drift guard)
        run: |
          python3 scripts/oidc_preflight.py check \
            --variables-file terraform/variables.tf \
            --require-repo waterapps-10-bootstrap-oidc-iam \
            --require-repo waterapps-15-iam-access \
            --require-repo waterapps-20-infra-enterprise \
            --require-repo waterapps-contact-form

      - name: PR Plan Skipped (security hardening)
        run: |
          {
            echo "## Terraform PR Plan Skipped"
            echo "- AWS credential issuance is blocked for pull_request events."
            echo "- Deploy role trust allows main/tag/production subjects only."
            echo "- Use workflow_dispatch from main for authenticated plan/apply."
          } >> "$GITHUB_STEP_SUMMARY"

  apply:
    name: "Terraform ${{ github.event.inputs.action || 'plan' }}"
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Guard Apply on Main Only
        if: github.event.inputs.action == 'apply'
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Terraform apply is allowed only from main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      # OIDC federation — requires AWS_DEPLOY_ROLE_ARN secret after first manual apply.
      # On first run, use local credentials instead (see README).
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Require Remote State Configuration
        run: |
          missing=0
          if [ -z "${{ github.event.inputs.tf_state_bucket }}" ]; then
            echo "::error::workflow_dispatch input tf_state_bucket is required for remote state"
            missing=1
          fi
          if [ -z "${{ github.event.inputs.tf_lock_table }}" ]; then
            echo "::error::workflow_dispatch input tf_lock_table is required for DynamoDB locking"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "## Remote State Required" >> "$GITHUB_STEP_SUMMARY"
            echo "- Provide \`tf_state_bucket\` and \`tf_lock_table\` when dispatching this workflow." >> "$GITHUB_STEP_SUMMARY"
            echo "- Bootstrap CI plan/apply is blocked with local state to avoid state loss on ephemeral runners." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ github.event.inputs.tf_state_bucket }}" \
            -backend-config="key=${{ github.event.inputs.tf_state_key }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ github.event.inputs.tf_lock_table }}" \
            -backend-config="encrypt=true"

      - name: Reconcile existing bootstrap resources into state
        if: github.event.inputs.action == 'apply'
        working-directory: terraform
        run: |
          set -euo pipefail

          project="waterapps"
          environment_name="prod"
          state_bucket_name="${project}-terraform-state"
          lock_table_name="${project}-terraform-lock"
          deploy_role_name="${project}-${environment_name}-github-deploy"
          deploy_policy_name="${project}-${environment_name}-deploy-permissions"
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          oidc_provider_arn="arn:aws:iam::${account_id}:oidc-provider/token.actions.githubusercontent.com"

          import_if_missing() {
            address="$1"
            import_id="$2"
            if terraform state show "$address" >/dev/null 2>&1; then
              echo "State already contains $address"
              return
            fi
            echo "Importing $address -> $import_id"
            terraform import -input=false "$address" "$import_id"
          }

          # Existing shared state resources (idempotent import)
          if aws s3api head-bucket --bucket "$state_bucket_name" >/dev/null 2>&1; then
            import_if_missing "aws_s3_bucket.terraform_state" "$state_bucket_name"
            import_if_missing "aws_s3_bucket_versioning.terraform_state" "$state_bucket_name"
            import_if_missing "aws_s3_bucket_server_side_encryption_configuration.terraform_state" "$state_bucket_name"
            import_if_missing "aws_s3_bucket_public_access_block.terraform_state" "$state_bucket_name"
          fi

          if aws dynamodb describe-table --table-name "$lock_table_name" >/dev/null 2>&1; then
            import_if_missing "aws_dynamodb_table.terraform_lock" "$lock_table_name"
          fi

          if aws iam get-open-id-connect-provider --open-id-connect-provider-arn "$oidc_provider_arn" >/dev/null 2>&1; then
            import_if_missing "aws_iam_openid_connect_provider.github" "$oidc_provider_arn"
          fi

          if aws iam get-role --role-name "$deploy_role_name" >/dev/null 2>&1; then
            import_if_missing "aws_iam_role.github_deploy" "$deploy_role_name"
          fi

          if aws iam get-role-policy --role-name "$deploy_role_name" --policy-name "$deploy_policy_name" >/dev/null 2>&1; then
            import_if_missing "aws_iam_role_policy.deploy_permissions" "${deploy_role_name}:${deploy_policy_name}"
          fi

      - name: Terraform Plan
        working-directory: terraform
        run: |
          # Break-glass for bootstrap deadlocks: allow policy self-heal even when
          # refresh-time reads fail due missing newly-added permissions.
          if [ "${{ github.event.inputs.action }}" = "apply" ]; then
            terraform plan -refresh=false -out=tfplan
          else
            terraform plan -out=tfplan
          fi

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Output Role ARN
        if: github.event.inputs.action == 'apply'
        working-directory: terraform
        run: |
          echo "## Bootstrap Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Set this as \`AWS_DEPLOY_ROLE_ARN\` in each repo's GitHub environment secrets:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform output -raw deploy_role_arn >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
